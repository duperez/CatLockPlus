name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build universal app
        run: bash build.sh

      - name: Verify architectures
        run: lipo -archs CatLockPlus.app/Contents/MacOS/CatLockPlus

      - name: Zip app bundle
        run: |
          ditto -c -k --keepParent CatLockPlus.app "CatLockPlus-${{ github.ref_name }}.zip"
          cp "CatLockPlus-${{ github.ref_name }}.zip" CatLockPlus.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CatLockPlus-${{ github.ref_name }}.zip
            CatLockPlus.zip
          generate_release_notes: true
